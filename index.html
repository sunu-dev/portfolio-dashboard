<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLB PORTFOLIO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/sections.css">
    <link rel="stylesheet" href="css/analysis-panel.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1><span class="brand">SOLB</span> PORTFOLIO</h1>
        <div class="header-right">
            <div style="display:flex;align-items:center;gap:6px;">
                <div class="status-dot"></div>
                <span class="last-update" id="lastUpdate">--:--</span>
            </div>
            <button class="btn-icon" id="refreshBtn" title="새로고침"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg></button>
            <button class="btn-icon" id="settingsBtn" title="설정"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
        </div>
    </header>

    <!-- Main Nav -->
    <nav class="main-nav">
        <button class="main-tab active" onclick="switchMainTab('portfolio',this)">포트폴리오</button>
        <button class="main-tab" onclick="switchMainTab('events',this)">이벤트 분석</button>
        <button class="main-tab" onclick="switchMainTab('news',this)">뉴스</button>
    </nav>

    <!-- Alert Banner -->
    <div class="alert-banner" id="alertBanner">
        <div class="alert-text" id="alertText"></div>
        <button class="alert-close" onclick="document.getElementById('alertBanner').classList.remove('active')">&#x2715;</button>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">설정</div>
        <div class="settings-body">
            <div class="settings-item">
                <label class="settings-label">API 키</label>
                <input type="password" class="form-input" id="apiKeyInput" placeholder="Finnhub API 키">
                <button class="btn-primary" onclick="updateApiKey()" style="margin-top:8px;width:100%;">저장</button>
            </div>
            <div class="settings-item">
                <label class="settings-label">
                    <div class="toggle">
                        <span>자동 새로고침</span>
                        <div class="toggle-switch active" id="autoRefreshToggle" onclick="toggleAutoRefresh()"></div>
                    </div>
                </label>
            </div>
            <div class="settings-item">
                <label class="settings-label">새로고침 주기</label>
                <select class="select-input" id="refreshInterval" onchange="updateRefreshInterval()">
                    <option value="15">15초</option>
                    <option value="30" selected>30초</option>
                    <option value="60">60초</option>
                </select>
            </div>
            <div class="settings-item">
                <button class="btn-cancel" style="width:100%;" onclick="clearAllData()">전체 초기화</button>
            </div>
        </div>
    </div>

    <!-- Analysis Overlay + Panel -->
    <div class="analysis-overlay" id="analysisOverlay" onclick="closeAnalysis()"></div>
    <div class="analysis-panel" id="analysisPanel">
        <div class="ap-header">
            <h3 id="apTitle">종목 분석</h3>
            <button class="ap-close" onclick="closeAnalysis()">&#x2715;</button>
        </div>
        <div class="ap-body" id="apBody">
            <div class="news-loading">분석 데이터를 불러오는 중...</div>
        </div>
    </div>

    <!-- Edit Stock Modal -->
    <div class="modal-overlay" id="editStockModal">
        <div class="modal-box">
            <div class="modal-title" id="editStockTitle">종목 설정</div>
            <div class="form-group"><label class="form-label">매수 평균 단가 ($)</label><input type="number" step="0.01" class="form-input" id="editAvgCost" placeholder="0.00"></div>
            <div class="form-group"><label class="form-label">보유 수량 (주)</label><input type="number" class="form-input" id="editShares" placeholder="0"></div>
            <div class="form-group"><label class="form-label">목표 수익률 (%)</label><input type="number" class="form-input" id="editTargetReturn" placeholder="예: 10"></div>
            <div id="editExtraFields"></div>
            <div class="form-actions"><button class="btn-cancel" onclick="closeEditStock()">취소</button><button class="btn-primary" onclick="saveEditStock()">저장</button></div>
        </div>
    </div>

    <!-- Add Event Modal -->
    <div class="modal-overlay" id="addEventModal">
        <div class="modal-box">
            <div class="modal-title">새 이벤트 추가</div>
            <div class="form-group"><label class="form-label">이벤트 이름</label><input type="text" class="form-input" id="eventName" placeholder="예: 금리 인상 시기"></div>
            <div class="form-group"><label class="form-label">시작일</label><input type="date" class="form-input" id="eventStartDate"></div>
            <div class="form-group"><label class="form-label">종료일 (비워두면 진행중)</label><input type="date" class="form-input" id="eventEndDate"></div>
            <div class="form-group"><label class="form-label">설명</label><input type="text" class="form-input" id="eventDesc" placeholder="간단한 설명"></div>
            <div class="form-actions"><button class="btn-cancel" onclick="closeAddEventModal()">취소</button><button class="btn-primary" onclick="saveNewEvent()">추가</button></div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Portfolio Section -->
        <div class="section active" id="portfolioSection">
            <div class="macro-strip" id="macroStrip"></div>
            <div class="search-section">
                <input type="text" class="search-input" id="searchInput" placeholder="종목 추가: 티커 또는 회사명 검색 (예: AAPL)">
                <div class="search-results" id="searchResults"></div>
            </div>
            <div class="tabs" id="categoryTabs">
                <button class="tab active" onclick="switchTab('short',this)">단기 트레이딩</button>
                <button class="tab" onclick="switchTab('long',this)">장기 투자</button>
                <button class="tab" onclick="switchTab('watch',this)">관심 종목</button>
            </div>
            <div class="stock-list" id="stockGrid"></div>
        </div>

        <!-- Events Section -->
        <div class="section" id="eventsSection">
            <div class="section-intro">
                <h2 class="section-title">이벤트 기간별 성과 비교</h2>
                <p class="section-desc">역사적 이벤트가 내 종목에 미친 영향을 비교해보세요. 과거 패턴을 보면 현재를 더 차분하게 판단할 수 있어요.</p>
            </div>
            <div class="event-tabs" id="eventTabs"></div>
            <div id="eventDetail"></div>
        </div>

        <!-- News Section -->
        <div class="section" id="newsSection">
            <div class="section-intro">
                <h2 class="section-title">투자 뉴스</h2>
                <p class="section-desc">미국/한국 증시와 내 관심종목 뉴스를 한곳에서 확인하세요.</p>
            </div>
            <div class="news-market-tabs">
                <button class="news-market-tab active" onclick="switchNewsMarket('us',this)">&#x1f1fa;&#x1f1f8; 미국 증시</button>
                <button class="news-market-tab" onclick="switchNewsMarket('kr',this)">&#x1f1f0;&#x1f1f7; 한국 증시</button>
                <button class="news-market-tab" onclick="switchNewsMarket('my',this)">내 관심종목</button>
                <button class="news-market-tab" onclick="switchNewsMarket('hot',this)">인기</button>
            </div>
            <div class="news-grid" id="newsGrid"><div class="news-loading">뉴스를 불러오는 중...</div></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
