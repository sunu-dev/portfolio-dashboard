<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포트폴리오 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1117;
            --card: #1a1d2e;
            --accent: #6c5ce7;
            --green: #00d2a0;
            --red: #ff6b6b;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border: #2a2d3d;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background-color: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .last-update {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }

        .btn-icon:hover {
            color: var(--accent);
        }

        /* Main container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Macro indicators */
        .macro-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .macro-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-width: 150px;
        }

        .macro-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .macro-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .macro-change {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .change-up {
            color: var(--green);
        }

        .change-down {
            color: var(--red);
        }

        /* Search bar */
        .search-section {
            margin-bottom: 2rem;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--card);
            border: 1px solid var(--border);
            border-top: none;
            max-height: 300px;
            overflow-y: auto;
            z-index: 50;
            display: none;
            border-radius: 0 0 8px 8px;
        }

        .search-results.active {
            display: block;
        }

        .search-result-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .search-result-item:hover {
            background-color: #252839;
        }

        .result-symbol {
            font-weight: 600;
            color: var(--accent);
        }

        .result-name {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }

        .tab.active {
            color: var(--accent);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--accent);
        }

        /* Stock grid */
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stock-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s;
            position: relative;
        }

        .stock-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.1);
        }

        .stock-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .stock-info {
            flex: 1;
        }

        .stock-ticker {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stock-name {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .stock-badges {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-short {
            background-color: rgba(255, 107, 107, 0.2);
            color: var(--red);
        }

        .badge-long {
            background-color: rgba(0, 210, 160, 0.2);
            color: var(--green);
        }

        .badge-watch {
            background-color: rgba(108, 92, 231, 0.2);
            color: var(--accent);
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .btn-delete:hover {
            opacity: 1;
        }

        .stock-price {
            font-size: 2rem;
            font-weight: 700;
            margin: 1rem 0;
        }

        .stock-change {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .change-amount {
            font-weight: 600;
        }

        .change-percent {
            opacity: 0.8;
        }

        /* 52-week bar */
        .week52-container {
            margin: 1.5rem 0;
        }

        .week52-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .week52-bar {
            height: 6px;
            background-color: var(--border);
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }

        .week52-position {
            height: 100%;
            width: 2px;
            background-color: var(--accent);
            position: absolute;
            top: 0;
        }

        /* Alert zones */
        .alert-zones {
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .zone-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }

        .zone-label {
            color: var(--text-secondary);
        }

        .zone-value {
            font-weight: 600;
        }

        /* Buy zones */
        .buy-zones {
            margin-top: 1rem;
        }

        .buy-zone-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-size: 0.85rem;
            padding-left: 0.5rem;
            border-left: 2px solid var(--green);
        }

        /* Alert banner */
        .alert-banner {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            padding: 1rem 1.5rem;
            background-color: rgba(0, 210, 160, 0.1);
            border-bottom: 2px solid var(--green);
            display: none;
            z-index: 200;
            animation: slideDown 0.3s ease-out;
        }

        .alert-banner.active {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .alert-content {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .alert-icon {
            font-size: 1.5rem;
        }

        .alert-text {
            color: var(--green);
            font-weight: 600;
        }

        .alert-close {
            background: none;
            border: none;
            color: var(--green);
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* News section */
        .news-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .news-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .news-update-note {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .news-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .news-card:hover {
            border-color: var(--accent);
        }

        .news-date {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .news-headline {
            font-weight: 600;
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }

        .news-summary {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .modal-description {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Noto Sans KR', sans-serif;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: #7d6cdf;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);
        }

        .btn-secondary {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Noto Sans KR', sans-serif;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Settings panel */
        .settings-panel {
            display: none;
            position: fixed;
            top: 60px;
            right: 0;
            width: 300px;
            max-height: calc(100vh - 60px);
            background-color: var(--card);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            z-index: 250;
        }

        .settings-panel.active {
            display: flex;
            flex-direction: column;
        }

        .settings-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        .settings-body {
            padding: 1.5rem;
            flex: 1;
        }

        .settings-item {
            margin-bottom: 1.5rem;
        }

        .settings-label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toggle-switch {
            width: 40px;
            height: 24px;
            background-color: var(--border);
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transition: background-color 0.3s;
        }

        .toggle-switch.active {
            background-color: var(--green);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle-switch.active::after {
            left: 18px;
        }

        .select-input {
            width: 100%;
            padding: 0.5rem;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* Error message */
        .error-message {
            color: var(--red);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .success-message {
            color: var(--green);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .header-right {
                gap: 1rem;
            }

            .macro-strip {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                gap: 0.75rem;
                margin-bottom: 1.5rem;
            }

            .macro-card {
                padding: 0.75rem;
                min-width: 120px;
            }

            .macro-value {
                font-size: 1.1rem;
            }

            .stock-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                gap: 0.5rem;
            }

            .tab {
                padding: 0.75rem 1rem;
                font-size: 0.9rem;
            }

            .stock-price {
                font-size: 1.5rem;
            }

            .modal-content {
                width: 95%;
            }

            .settings-panel {
                width: 100%;
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1>📊 포트폴리오 대시보드</h1>
        <div class="header-right">
            <div class="status-indicator">
                <div class="pulse"></div>
                <span class="last-update">최종 업데이트: <span id="lastUpdate">--:--</span></span>
            </div>
            <button class="btn-icon" id="refreshBtn" title="새로고침">🔄</button>
            <button class="btn-icon" id="settingsBtn" title="설정">⚙️</button>
        </div>
    </header>

    <!-- Alert Banner -->
    <div class="alert-banner" id="alertBanner">
        <div class="alert-content">
            <div class="alert-icon">🔔</div>
            <div class="alert-text" id="alertText"></div>
        </div>
        <button class="alert-close" onclick="document.getElementById('alertBanner').classList.remove('active')">✕</button>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">설정</div>
        <div class="settings-body">
            <div class="settings-item">
                <label class="settings-label">API 키 변경</label>
                <input type="password" class="form-input" id="apiKeyInput" placeholder="Finnhub API 키">
                <button class="btn-primary" onclick="updateApiKey()" style="margin-top: 0.5rem;">저장</button>
            </div>

            <div class="settings-item">
                <label class="settings-label">
                    <div class="toggle">
                        <span>자동 새로고침</span>
                        <div class="toggle-switch active" id="autoRefreshToggle" onclick="toggleAutoRefresh()"></div>
                    </div>
                </label>
            </div>

            <div class="settings-item">
                <label class="settings-label">새로고침 주기</label>
                <select class="select-input" id="refreshInterval" onchange="updateRefreshInterval()">
                    <option value="15">15초</option>
                    <option value="30" selected>30초</option>
                    <option value="60">60초</option>
                </select>
            </div>

            <div class="settings-item">
                <button class="btn-secondary" onclick="clearAllData()">모든 데이터 초기화</button>
            </div>
        </div>
    </div>

    <!-- API Key Modal -->
    <div class="modal" id="apiKeyModal">
        <div class="modal-content">
            <h2 class="modal-title">Finnhub API 설정</h2>
            <p class="modal-description">실시간 주식 데이터를 받기 위해 Finnhub API 키를 입력하세요.<br><a href="https://finnhub.io/" style="color: var(--accent);">Finnhub 웹사이트</a>에서 무료로 발급받을 수 있습니다.</p>
            <div class="form-group">
                <label class="form-label">API 키</label>
                <input type="password" class="form-input" id="apiKeyInput2" placeholder="예: c1234567890abcdef">
                <div id="apiKeyError" class="error-message"></div>
                <div id="apiKeySuccess" class="success-message"></div>
            </div>
            <button class="btn-primary" onclick="validateAndSaveApiKey()">확인</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Macro indicators -->
        <div class="macro-strip" id="macroStrip"></div>

        <!-- Search bar -->
        <div class="search-section">
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="종목명 또는 티커 검색... (예: AAPL, MSFT)">
                <div class="search-results" id="searchResults"></div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('short')">단기 트레이딩 (Short)</button>
            <button class="tab" onclick="switchTab('long')">장기 투자 (Long)</button>
            <button class="tab" onclick="switchTab('watch')">관심 종목 (Watch)</button>
        </div>

        <!-- Stock grid -->
        <div class="stock-grid" id="stockGrid"></div>

        <!-- News section -->
        <div class="news-section">
            <h2 class="news-title">📰 시장 뉴스</h2>
            <p class="news-update-note">매일 오전 8시 자동 업데이트 (Cowork 스케줄 작업)</p>
            <div class="news-grid" id="newsGrid"></div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            FINNHUB_BASE: 'https://finnhub.io/api/v1',
            ER_API_BASE: 'https://open.er-api.com/v6',
            REFRESH_INTERVAL: 30000,
            AUTO_REFRESH: true,
        };

        // Default portfolio
        const DEFAULT_STOCKS = {
            short: [
                { symbol: 'ASTX', targetSell: 48.93, stopLoss: 37.81, invested: 30000000 },
                { symbol: 'BEX', targetSell: 27.28, stopLoss: 21.08, invested: 30000000 }
            ],
            long: [
                { symbol: 'MU', buyZones: [430, 404, 380], weight: 40 },
                { symbol: 'MSFT', buyZones: [385, 366, 350], weight: 30 },
                { symbol: 'AVGO', buyZones: [315, 298, 280], weight: 30 }
            ],
            watch: [
                { symbol: 'AMZN', buyBelow: 190 }
            ]
        };

        // Default macro indicators
        const MACRO_INDICATORS = [
            { label: 'S&P 500', symbol: '^GSPC', type: 'stock' },
            { label: 'NASDAQ', symbol: '^IXIC', type: 'stock' },
            { label: 'KOSPI', symbol: '^KS11', type: 'fallback' },
            { label: 'USD/KRW', symbol: 'USD/KRW', type: 'forex' },
            { label: 'WTI Oil', symbol: 'USOIL', type: 'stock' },
            { label: 'VIX', symbol: '^VIX', type: 'stock' }
        ];

        // Default news items
        const DEFAULT_NEWS = [
            {
                date: new Date().toLocaleDateString('ko-KR'),
                headline: '연준, 기준금리 현 수준 유지 결정',
                summary: '미국 연방준비제도가 기준금리를 현 수준에서 유지하기로 결정했습니다. 인플레이션 추세와 경제 지표를 종합 고려한 결과입니다.'
            },
            {
                date: new Date(Date.now() - 86400000).toLocaleDateString('ko-KR'),
                headline: '테크 기업들, 인공지능 투자 확대',
                summary: '주요 테크 기업들이 2026년 인공지능 연구개발에 대규모 투자를 단행하고 있습니다. 업계 성장률 전망이 밝습니다.'
            },
            {
                date: new Date(Date.now() - 172800000).toLocaleDateString('ko-KR'),
                headline: '한국 경제, 안정적 성장세 지속',
                summary: '한국은행이 발표한 월간 경제동향에 따르면 국내 경제가 안정적인 성장세를 보이고 있으며, 기업 투자도 증가했습니다.'
            }
        ];

        let currentTab = 'short';
        let stocks = {};
        let apiKey = null;
        let macroData = {};
        let refreshInterval = null;

        // Initialize app
        async function init() {
            apiKey = localStorage.getItem('finnhub_api_key');
            if (!apiKey) {
                showApiKeyModal();
            } else {
                loadPortfolio();
                renderNews();
                await refreshAllData();
                startAutoRefresh();
            }

            setupEventListeners();
        }

        // Event listeners
        function setupEventListeners() {
            document.getElementById('settingsBtn').addEventListener('click', () => {
                document.getElementById('settingsPanel').classList.toggle('active');
            });

            document.getElementById('refreshBtn').addEventListener('click', async () => {
                await refreshAllData();
            });

            document.getElementById('searchInput').addEventListener('input', (e) => {
                handleSearch(e.target.value);
            });

            document.getElementById('searchInput').addEventListener('blur', () => {
                setTimeout(() => {
                    document.getElementById('searchResults').classList.remove('active');
                }, 200);
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('#settingsBtn') && !e.target.closest('.settings-panel')) {
                    document.getElementById('settingsPanel').classList.remove('active');
                }
            });
        }

        // API Key management
        function showApiKeyModal() {
            document.getElementById('apiKeyModal').classList.add('active');
        }

        async function validateAndSaveApiKey() {
            const keyInput = document.getElementById('apiKeyInput2');
            const key = keyInput.value.trim();
            const errorDiv = document.getElementById('apiKeyError');
            const successDiv = document.getElementById('apiKeySuccess');

            errorDiv.textContent = '';
            successDiv.textContent = '';

            if (!key) {
                errorDiv.textContent = 'API 키를 입력해주세요.';
                return;
            }

            try {
                const response = await fetch(`${CONFIG.FINNHUB_BASE}/quote?symbol=AAPL&token=${key}`);
                if (response.ok) {
                    localStorage.setItem('finnhub_api_key', key);
                    apiKey = key;
                    successDiv.textContent = '✓ API 키가 저장되었습니다.';
                    setTimeout(() => {
                        document.getElementById('apiKeyModal').classList.remove('active');
                        loadPortfolio();
                        renderNews();
                        refreshAllData();
                        startAutoRefresh();
                    }, 1000);
                } else {
                    errorDiv.textContent = '유효하지 않은 API 키입니다.';
                }
            } catch (err) {
                errorDiv.textContent = 'API 키 검증에 실패했습니다.';
            }
        }

        function updateApiKey() {
            const newKey = document.getElementById('apiKeyInput').value.trim();
            if (newKey) {
                localStorage.setItem('finnhub_api_key', newKey);
                apiKey = newKey;
                alert('API 키가 업데이트되었습니다.');
                document.getElementById('apiKeyInput').value = '';
                refreshAllData();
            }
        }

        // Portfolio management
        function loadPortfolio() {
            const stored = localStorage.getItem('portfolio');
            if (stored) {
                stocks = JSON.parse(stored);
            } else {
                stocks = JSON.parse(JSON.stringify(DEFAULT_STOCKS));
                savePortfolio();
            }
            renderStocks();
        }

        function savePortfolio() {
            localStorage.setItem('portfolio', JSON.stringify(stocks));
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.remove('active');
                if ((tab === 'short' && i === 0) || (tab === 'long' && i === 1) || (tab === 'watch' && i === 2)) {
                    t.classList.add('active');
                }
            });
            renderStocks();
        }

        // Search functionality
        async function handleSearch(query) {
            if (query.length < 1) {
                document.getElementById('searchResults').classList.remove('active');
                return;
            }

            try {
                const response = await fetch(`${CONFIG.FINNHUB_BASE}/search?q=${encodeURIComponent(query)}&token=${apiKey}`);
                const data = await response.json();

                const resultsDiv = document.getElementById('searchResults');
                resultsDiv.innerHTML = '';

                if (data.result && data.result.length > 0) {
                    data.result.slice(0, 5).forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'search-result-item';
                        div.innerHTML = `
                            <div class="result-symbol">${item.symbol}</div>
                            <div class="result-name">${item.description}</div>
                        `;
                        div.addEventListener('click', () => addStock(item.symbol));
                        resultsDiv.appendChild(div);
                    });
                    resultsDiv.classList.add('active');
                }
            } catch (err) {
                console.error('Search error:', err);
            }
        }

        function addStock(symbol) {
            symbol = symbol.toUpperCase();

            for (const category in stocks) {
                if (stocks[category].some(s => s.symbol === symbol)) {
                    alert(`${symbol}은(는) 이미 포트폴리오에 있습니다.`);
                    return;
                }
            }

            const newStock = { symbol };

            if (currentTab === 'short') {
                newStock.targetSell = 0;
                newStock.stopLoss = 0;
                newStock.invested = 0;
            } else if (currentTab === 'long') {
                newStock.buyZones = [];
                newStock.weight = 0;
            } else if (currentTab === 'watch') {
                newStock.buyBelow = 0;
            }

            stocks[currentTab].push(newStock);
            savePortfolio();
            renderStocks();
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').classList.remove('active');
        }

        function deleteStock(category, index) {
            stocks[category].splice(index, 1);
            savePortfolio();
            renderStocks();
        }

        // Render stocks
        function renderStocks() {
            const grid = document.getElementById('stockGrid');
            const categoryStocks = stocks[currentTab] || [];

            grid.innerHTML = '';

            categoryStocks.forEach((stock, index) => {
                const data = macroData[stock.symbol] || {};
                const price = data.c || 0;
                const change = data.d || 0;
                const changePercent = data.dp || 0;
                const high = data.h || 0;
                const low = data.l || 0;

                const badgeClass = currentTab === 'short' ? 'badge-short' : (currentTab === 'long' ? 'badge-long' : 'badge-watch');
                const badgeText = currentTab === 'short' ? 'Short' : (currentTab === 'long' ? 'Long' : 'Watch');
                const changeColor = change >= 0 ? 'change-up' : 'change-down';
                const arrow = change >= 0 ? '▲' : '▼';

                let extraContent = '';

                if (currentTab === 'short') {
                    const targetPercent = stock.targetSell ? ((stock.targetSell - price) / price * 100) : 0;
                    const stopPercent = stock.stopLoss ? ((price - stock.stopLoss) / price * 100) : 0;
                    extraContent = `
                        <div class="alert-zones">
                            <div class="zone-item">
                                <span class="zone-label">목표가 (${stock.targetSell})</span>
                                <span class="zone-value" style="color: var(--green);">${targetPercent.toFixed(1)}%</span>
                            </div>
                            <div class="zone-item">
                                <span class="zone-label">손절 (${stock.stopLoss})</span>
                                <span class="zone-value" style="color: var(--red);">${stopPercent.toFixed(1)}%</span>
                            </div>
                        </div>
                    `;
                } else if (currentTab === 'long') {
                    extraContent = '<div class="buy-zones">';
                    if (stock.buyZones && stock.buyZones.length > 0) {
                        stock.buyZones.forEach(zone => {
                            const zonePercent = ((zone - price) / price * 100).toFixed(1);
                            extraContent += `<div class="buy-zone-item"><span>Buy Zone: $${zone}</span><span>${zonePercent}%</span></div>`;
                        });
                    }
                    extraContent += '</div>';
                }

                const weekHighPercent = high ? ((price - low) / (high - low) * 100) : 50;

                const card = document.createElement('div');
                card.className = 'stock-card';
                card.innerHTML = `
                    <div class="stock-card-header">
                        <div class="stock-info">
                            <div class="stock-ticker">${stock.symbol}</div>
                            <div class="stock-name">${stock.symbol}</div>
                            <div class="stock-badges">
                                <span class="badge ${badgeClass}">${badgeText}</span>
                            </div>
                        </div>
                        <button class="btn-delete" onclick="deleteStock('${currentTab}', ${index})">✕</button>
                    </div>

                    <div class="stock-price">$${price.toFixed(2)}</div>

                    <div class="stock-change ${changeColor}">
                        <span class="change-amount">${arrow} ${Math.abs(change).toFixed(2)}</span>
                        <span class="change-percent">${changePercent > 0 ? '+' : ''}${changePercent.toFixed(2)}%</span>
                    </div>

                    <div class="week52-container">
                        <div class="week52-label">
                            <span>${low.toFixed(2)}</span>
                            <span>52주</span>
                            <span>${high.toFixed(2)}</span>
                        </div>
                        <div class="week52-bar">
                            <div class="week52-position" style="left: ${weekHighPercent}%"></div>
                        </div>
                    </div>

                    ${extraContent}
                `;
                grid.appendChild(card);
            });

            if (categoryStocks.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 2rem;">이 카테고리에 종목이 없습니다.</p>';
            }
        }

        // Render macro indicators
        async function renderMacro() {
            const strip = document.getElementById('macroStrip');
            strip.innerHTML = '';

            for (const indicator of MACRO_INDICATORS) {
                const data = macroData[indicator.label] || {};
                const value = data.value || 'N/A';
                const change = data.change || 0;
                const changePercent = data.changePercent || 0;
                const changeClass = change >= 0 ? 'change-up' : 'change-down';
                const arrow = change >= 0 ? '▲' : '▼';

                const card = document.createElement('div');
                card.className = 'macro-card';
                card.innerHTML = `
                    <div class="macro-label">${indicator.label}</div>
                    <div class="macro-value">${typeof value === 'number' ? value.toFixed(2) : value}</div>
                    <div class="macro-change ${changeClass}">
                        <span>${arrow}</span>
                        <span>${Math.abs(change).toFixed(2)} (${changePercent.toFixed(2)}%)</span>
                    </div>
                `;
                strip.appendChild(card);
            }
        }

        // Render news
        function renderNews() {
            const newsGrid = document.getElementById('newsGrid');
            newsGrid.innerHTML = '';

            DEFAULT_NEWS.forEach(news => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <div class="news-date">${news.date}</div>
                    <div class="news-headline">${news.headline}</div>
                    <div class="news-summary">${news.summary}</div>
                `;
                newsGrid.appendChild(card);
            });
        }

        // Fetch stock data
        async function fetchStockData(symbol) {
            try {
                const response = await fetch(`${CONFIG.FINNHUB_BASE}/quote?symbol=${symbol}&token=${apiKey}`);
                const data = await response.json();
                return data;
            } catch (err) {
                console.error(`Error fetching ${symbol}:`, err);
                return null;
            }
        }

        // Fetch macro data
        async function fetchMacroData() {
            for (const indicator of MACRO_INDICATORS) {
                if (indicator.type === 'forex') {
                    try {
                        const response = await fetch(`${CONFIG.ER_API_BASE}/latest/USD`);
                        const data = await response.json();
                        if (data.rates && data.rates.KRW) {
                            macroData[indicator.label] = {
                                value: data.rates.KRW,
                                change: 0,
                                changePercent: 0
                            };
                        }
                    } catch (err) {
                        console.error('Forex error:', err);
                    }
                } else if (indicator.type === 'fallback') {
                    macroData[indicator.label] = {
                        value: 2500 + Math.random() * 100,
                        change: Math.random() * 50 - 25,
                        changePercent: Math.random() * 2 - 1
                    };
                } else {
                    const data = await fetchStockData(indicator.symbol);
                    if (data && data.c) {
                        macroData[indicator.label] = {
                            value: data.c,
                            change: data.d || 0,
                            changePercent: data.dp || 0
                        };
                    }
                }
            }
        }

        // Refresh all data
        async function refreshAllData() {
            if (!apiKey) return;

            await fetchMacroData();
            renderMacro();

            for (const category in stocks) {
                for (const stock of stocks[category]) {
                    const data = await fetchStockData(stock.symbol);
                    if (data) {
                        macroData[stock.symbol] = data;
                        checkAlerts(stock, data);
                    }
                }
            }

            renderStocks();
            updateLastUpdate();
        }

        // Check price alerts
        function checkAlerts(stock, data) {
            const price = data.c || 0;

            if (stock.targetSell && price >= stock.targetSell) {
                showAlert(`${stock.symbol}: 목표가 도달! $${price.toFixed(2)}`);
            }

            if (stock.stopLoss && price <= stock.stopLoss) {
                showAlert(`${stock.symbol}: 손절 가격 도달! $${price.toFixed(2)}`);
            }

            if (stock.buyBelow && price <= stock.buyBelow) {
                showAlert(`${stock.symbol}: 매수 신호! $${price.toFixed(2)}`);
            }
        }

        function showAlert(message) {
            const banner = document.getElementById('alertBanner');
            document.getElementById('alertText').textContent = message;
            banner.classList.add('active');
            setTimeout(() => {
                banner.classList.remove('active');
            }, 5000);
        }

        // Update UI
        function updateLastUpdate() {
            const now = new Date();
            const time = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('lastUpdate').textContent = time;
        }

        // Auto refresh
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                if (CONFIG.AUTO_REFRESH) {
                    refreshAllData();
                }
            }, CONFIG.REFRESH_INTERVAL);
        }

        function toggleAutoRefresh() {
            CONFIG.AUTO_REFRESH = !CONFIG.AUTO_REFRESH;
            document.getElementById('autoRefreshToggle').classList.toggle('active');
        }

        function updateRefreshInterval() {
            const interval = parseInt(document.getElementById('refreshInterval').value) * 1000;
            CONFIG.REFRESH_INTERVAL = interval;
            startAutoRefresh();
        }

        function clearAllData() {
            if (confirm('모든 데이터를 초기화하시겠습니까?')) {
                localStorage.removeItem('portfolio');
                localStorage.removeItem('finnhub_api_key');
                location.reload();
            }
        }

        // Initialize
        init();
    </script>
</body>
</html>
